version: "3.9"

# Development override — mounts source code, enables hot-reload, exposes all ports
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  mongodb:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      target: development
    command: ["npm", "run", "dev"]
    volumes:
      - ./backend/src:/app/src:ro
      - uploads_data:/app/uploads
    environment:
      NODE_ENV: development
    ports:
      - "3001:3001"

  worker:
    build:
      target: development
    command: ["npm", "run", "worker"]
    volumes:
      - ./backend/src:/app/src:ro
      - uploads_data:/app/uploads
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
